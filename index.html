<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
  <title>Calculadora de Sensibilidad</title>

  <!-- CSS integrado -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0a0a0a;
      color: #e0e0e0;
      margin: 0;
      padding: 15px;
      line-height: 1.6;
    }
    h1 {
      text-align: center;
      color: #00f5c4;
      text-shadow: 0 0 12px rgba(0, 245, 196, 0.5);
      margin-bottom: 20px;
    }
    h2 { color: #00f5c4; margin: 25px 0 15px 0; }
    .menu { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 25px; }
    .menu button { background:#1a1a1a; color:#00f5c4; border:2px solid #00f5c4; padding:12px 18px; border-radius:8px; font-weight:bold; cursor:pointer; transition:0.3s; flex:1; min-width:110px; }
    .menu button:hover { background:#00f5c4; color:#111; }
    input, select { background:#161616; color:#e0e0e0; border:2px solid #00f5c4; border-radius:8px; padding:14px 12px; font-size:16px; width:100%; margin-bottom:12px; }
    input:focus, select:focus { border-color:#00b8ff; box-shadow:0 0 0 3px rgba(0,184,255,0.3); outline:none; }
    button { background:#00f5c4; color:#111; font-weight:bold; border:none; border-radius:8px; padding:14px; font-size:16px; cursor:pointer; transition:0.3s; width:100%; margin:10px 0; }
    button:hover { background:#00e0b0; transform:translateY(-2px); }
    .tab { background:#111; padding:20px; border-radius:12px; border:1px solid #00f5c433; margin-bottom:25px; display:none; }
    .tab.active { display:block; }
    .resultado { background:#1a1a1a; border:2px solid #00f5c4; border-radius:8px; padding:16px; margin-top:15px; font-weight:bold; }
  </style>
</head>
<body>

  <h1>Calculadora de Sensibilidad</h1>

  <div class="menu">
    <button onclick="mostrar('clasificacion')">Clasificación</button>
    <button onclick="mostrar('inversa')">Cm → Sens</button>
    <button onclick="mostrar('juegos')">Por Juego</button>
    <button onclick="mostrar('pros')">Jugadores Conocidos</button>
  </div>

  <!-- Clasificación -->
  <div id="clasificacion" class="tab active">
    <h2>Clasificación de sensibilidad</h2>
    <input type="number" id="cmInput" placeholder="Ingresa tu cm/360" step="0.01">
    <p id="resultadoClasificacion" class="resultado"></p>
  </div>

  <!-- Cm → Sensibilidad -->
  <div id="inversa" class="tab">
    <h2>De cm/360 a Sensibilidad</h2>
    <label>cm/360:</label>
    <input type="number" id="cmReverse" placeholder="Ej: 30" step="0.01">
    <label>DPI:</label>
    <input type="number" id="dpiReverse" placeholder="Ej: 1600" value="1600">
    <label>Juego:</label>
    <select id="juegoReverse">
      <option value="valorant">Valorant</option>
      <option value="apex">Apex Legends</option>
      <option value="blood">Blood Strike</option>
      <option value="cs2">CS2</option>
      <option value="fivem">FiveM</option>
      <option value="r6">Rainbow Six</option>
      <option value="rust">Rust</option>
      <option value="paladins">Paladins</option>
      <option value="overwatch">Overwatch</option>
      <option value="re4">Resident Evil</option>
    </select>
    <button onclick="calcularSensibilidadInversa()">Calcular Sensibilidad</button>
    <p id="resultadoSensInversa" class="resultado"></p>
  </div>

  <!-- Por Juego -->
  <div id="juegos" class="tab">
    <h2>Calcular cm/360 por juego</h2>
    <label>Sensibilidad:</label>
    <input type="number" id="sens" placeholder="Ej: 0.5" step="0.01">
    <label>DPI:</label>
    <input type="number" id="dpi" placeholder="Ej: 800">
    <label>Juego:</label>
    <select id="juego">
      <option value="apex">Apex Legends</option>
      <option value="blood">Blood Strike</option>
      <option value="cs2">CS2</option>
      <option value="fivem">FiveM</option>
      <option value="r6">Rainbow Six</option>
      <option value="rust">Rust</option>
      <option value="valorant">Valorant</option>
      <option value="paladins">Paladins</option>
      <option value="overwatch">Overwatch</option>
      <option value="re4">Resident Evil</option>
    </select>
    <p id="resultadoJuego" class="resultado"></p>
  </div>

  <!-- Jugadores Pros -->
  <div id="pros" class="tab">
    <h2>Jugadores Profesionales</h2>
    <label>Selecciona el juego:</label>
    <select id="juegoPros" onchange="cargarPros()">
      <option value="valorant">Valorant</option>
      <option value="cs2">CS2</option>
      <option value="apex">Apex Legends</option>
      <option value="blood">Blood Strike</option>
      <option value="overwatch">Overwatch</option>
    </select>
    <div id="listaPros" style="margin-top: 25px;"></div>
  </div>

  <!-- JS integrado -->
  <script>

          <option value="overwatch">Overwatch</option>
          
        </select>
        <div id="listaPros" style="margin-top: 25px;"></div>

    <script src="script.js"></script>
</body>
</html>
